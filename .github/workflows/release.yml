name: Release & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx ng build --base-href /${{ github.event.repository.name }}/
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
        env:
          CI: true

      - name: Copy PDFs into Pages output
        run: |
          mkdir -p dist/resume/browser
          if [ -f e2e-results/resume.pdf ]; then
            cp e2e-results/resume.pdf dist/resume/browser/
          fi
          for f in e2e-results/resume-*.pdf; do
            [ -f "$f" ] && cp "$f" dist/resume/browser/
          done
          ls -la dist/resume/browser/*.pdf 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/resume/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  attach-pdf:
    name: Attach PDFs to Release
    needs: [release-please, deploy]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download PDFs from Pages and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          BASE="https://${OWNER}.github.io/${REPO}"
          # Default PDF
          curl -fsSL "${BASE}/resume.pdf" -o resume.pdf && \
            gh release upload "$TAG" resume.pdf --clobber && echo "Attached resume.pdf"
          # Per-target PDFs (discover from repo)
          for f in public/resume/targets/*.yaml; do
            [ -f "$f" ] || continue
            id=$(basename "$f" .yaml)
            case "$id" in *[!a-zA-Z0-9-]*) continue ;; esac
            if curl -fsSL "${BASE}/resume-${id}.pdf" -o "resume-${id}.pdf" 2>/dev/null && [ -s "resume-${id}.pdf" ]; then
              gh release upload "$TAG" "resume-${id}.pdf" --clobber && echo "Attached resume-${id}.pdf"
            fi
          done
