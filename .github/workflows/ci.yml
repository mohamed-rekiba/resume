name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.16.0'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - name: Prettier check
        run: npm run format:check
      - name: ESLint (max-warnings 0)
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run test -- --no-watch

  build:
    name: Production Build
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - name: ng build
        run: npx ng build --base-href /${{ github.event.repository.name }}/
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

  ats-validation:
    name: ATS Compatibility
    runs-on: ubuntu-24.04
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Run ATS validation tests
        run: npx playwright test

      - name: Upload resume PDF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: resume-pdf
          path: e2e-results/resume.pdf
          retention-days: 30

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
